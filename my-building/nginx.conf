server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /gate-building-ai {
        return 301 /gate-building-ai/;
    }

    location ^~ /gate-building-ai/assets/ {
        try_files $uri =404;
    }

    location ^~ /gate-building-ai/floorplans/ {
        try_files $uri =404;
    }

    location ^~ /gate-building-ai/cesium/ {
        try_files $uri =404;
    }

    location ^~ /gate-building-ai/ {
        try_files $uri $uri/ /gate-building-ai/index.html;
    }
}